
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>NexCore — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--c:#00e5ff;--c2:#0077ff;--dark:#04090f;--card:rgba(6,18,28,0.92);--border:rgba(0,229,255,0.14);--border2:rgba(255,255,255,0.07);--text:#94b8c8;--white:#f0f8ff;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased;}
canvas#bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.08;}
.ov{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,50,80,0.55) 0%,transparent 65%),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(0,50,120,0.2) 0%,transparent 60%);}
.grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:60px 60px;}
.page{position:relative;z-index:2;width:100%;max-width:420px;padding:1.5rem;}
/* Telegram */
.tg-wrap{display:flex;justify-content:center;margin-bottom:1.4rem;animation:fadeUp .5s ease both;}
.tg-link{display:inline-flex;align-items:center;gap:.55rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1.05rem;color:var(--white);text-decoration:none;padding:.45rem 1.3rem;border-radius:100px;background:rgba(0,136,204,.08);border:1px solid rgba(0,136,204,.22);transition:all .2s;}
.tg-link:hover{background:rgba(0,136,204,.18);border-color:rgba(0,180,255,.45);box-shadow:0 0 22px rgba(0,136,204,.25);transform:translateY(-1px);}
.tg-dot{width:7px;height:7px;background:#0088cc;border-radius:50%;box-shadow:0 0 8px rgba(0,136,204,.9);flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
/* Logo */
.logo-bar{display:flex;align-items:center;justify-content:center;margin-bottom:2rem;animation:fadeUp .6s ease both;}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.5rem;color:var(--white);letter-spacing:-0.01em;}
.logo em{color:var(--c);font-style:normal;}
.chip{margin-left:.8rem;font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--c);border:1px solid var(--border);padding:.22rem .7rem;border-radius:100px;background:rgba(0,229,255,.05);}
/* Card */
.card{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:2.2rem 2rem 2rem;backdrop-filter:blur(18px);position:relative;overflow:hidden;animation:fadeUp .7s .08s ease both;box-shadow:0 40px 100px rgba(0,0,0,.6);}
.card::before{content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;background:radial-gradient(circle,rgba(0,229,255,.09) 0%,transparent 70%);pointer-events:none;}
/* Error */
.err{background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.2);border-radius:8px;padding:.75rem 1rem;margin-bottom:1.2rem;font-size:.82rem;color:#ff7070;display:flex;align-items:center;gap:.6rem;}
.err svg{width:14px;height:14px;stroke:#ff7070;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
/* Form */
.fg{margin-bottom:1.2rem;}
label{display:block;font-family:'JetBrains Mono',monospace;font-size:.67rem;letter-spacing:.14em;text-transform:uppercase;color:var(--c);margin-bottom:.55rem;opacity:.85;}
.iw{position:relative;}
.iw>svg{position:absolute;left:1rem;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;transition:stroke .2s;}
.iw:focus-within>svg{stroke:var(--c);}
input[type=text],input[type=password]{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:10px;padding:.85rem 1rem .85rem 2.8rem;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,background .2s,box-shadow .2s;-webkit-appearance:none;}
input::placeholder{color:rgba(148,184,200,.35);font-size:.85rem;}
input:focus{border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.03);box-shadow:0 0 0 3px rgba(0,229,255,.07);}
input.has-eye{padding-right:2.8rem;}
.eye{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:.2rem;display:flex;align-items:center;}
.eye svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
.eye:hover svg{stroke:var(--c);}
/* Button */
.btn{width:100%;background:linear-gradient(135deg,var(--c),var(--c2));color:#000;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.04em;padding:1rem;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:box-shadow .25s,transform .15s;margin-top:1.6rem;}
.btn:hover{box-shadow:0 0 40px rgba(0,229,255,.45);transform:translateY(-2px);}
.btn:active{transform:translateY(0);}
.btn svg{width:16px;height:16px;stroke:#000;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.foot{text-align:center;margin-top:1.6rem;font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:rgba(148,184,200,.25);text-transform:uppercase;animation:fadeUp .8s .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(0,136,204,.8);}50%{box-shadow:0 0 14px rgba(0,180,255,1);}}
@media(max-width:480px){.card{padding:1.8rem 1.4rem;}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="ov"></div>
<div class="grid"></div>

<div class="page">

  <div class="tg-wrap">
    <a href="https://t.me/C4d3r" target="_blank" rel="noopener" class="tg-link">
      <span class="tg-dot"></span>

  </div>

  <div class="logo-bar">
    <div class="logo">Nex<em>Core</em></div>
    <span class="chip">Admin</span>
  </div>

  <div class="card">

    
    <div class="err">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <?= htmlspecialchars($err) ?>

    <form onsubmit="return doLogin(event)">

      <div class="fg">
        <label for="login_user">Username</label>
        <div class="iw">
          <input type="text" id="login_user" name="login_user" placeholder="Enter username" autocomplete="username" autofocus required/>
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

      <div class="fg" style="margin-bottom:0">
        <label for="login_pass">Password</label>
        <div class="iw">
          <input type="password" id="login_pass" name="login_pass" placeholder="Enter password" class="has-eye" autocomplete="current-password" required/>
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button class="eye" type="button" onclick="togglePwd()">
            <svg id="eyeIco" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>

    </form>
  </div>

  <div class="foot">&copy; 2025 NexCore Studio</div>

</div>

<script>
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');let W,H,pts=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;init();}
  function init(){pts=[];const n=Math.floor(W*H/18000);for(let i=0;i<n;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.2+.4});}
  function draw(){ctx.clearRect(0,0,W,H);for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<140){ctx.beginPath();ctx.strokeStyle=`rgba(0,229,255,${(1-d/140)*.4})`;ctx.lineWidth=.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,0.7)';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;});requestAnimationFrame(draw);}
  window.addEventListener('resize',resize);resize();draw();
})();
function togglePwd(){
  const i=document.getElementById('login_pass'),ico=document.getElementById('eyeIco');
  if(i.type==='password'){i.type='text';ico.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';}
  else{i.type='password';ico.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}
}
</script>

<script>
function doLogin(e) {
  e.preventDefault();
  var u = document.getElementById('login_user').value.trim();
  var p = document.getElementById('login_pass').value;
  if (u === 'IronicGuru' && p === 'IronicGuru') {
    sessionStorage.setItem('fk_admin','1');
    window.location.href = 'admin-dashboard.html';
  } else {
    document.getElementById('loginError').style.display='flex';
    document.getElementById('loginError').querySelector('span').textContent='Invalid username or password.';
  }
  return false;
}
// Auto redirect if already logged in
if (sessionStorage.getItem('fk_admin')==='1') window.location.href='admin-dashboard.html';
</script>
